<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Core glow -->
    <radialGradient id="coreGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(128 128) rotate(90) scale(80)">
      <stop offset="0" stop-color="#C084FC" stop-opacity="0.9"></stop>
      <stop offset="1" stop-color="#A855F7" stop-opacity="0.05"></stop>
    </radialGradient>

    <!-- Node glow -->
    <filter id="nodeGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="40" fill="#08070F"></rect>

  <!-- Core aura -->
  <circle cx="128" cy="128" r="72" fill="url(#coreGlow)"></circle>

  <!-- Connection lines -->
  <g stroke="#2D1F4A" stroke-width="3">
    <line x1="128" y1="40" x2="128" y2="128"></line>
    <line x1="128" y1="216" x2="128" y2="128"></line>
    <line x1="40" y1="128" x2="128" y2="128"></line>
    <line x1="216" y1="128" x2="128" y2="128"></line>
    <line x1="64" y1="64" x2="128" y2="128"></line>
    <line x1="192" y1="64" x2="128" y2="128"></line>
    <line x1="64" y1="192" x2="128" y2="128"></line>
    <line x1="192" y1="192" x2="128" y2="128"></line>
  </g>

  <!-- Central node (source of truth) -->
  <g filter="url(#nodeGlow)">
    <circle cx="128" cy="128" r="16" fill="#A855F7"></circle>
  </g>

  <!-- Outer nodes -->
  <g filter="url(#nodeGlow)">
    <circle cx="128" cy="40" r="8" fill="#00E5FF"></circle>
    <circle cx="128" cy="216" r="8" fill="#7B8CFF"></circle>
    <circle cx="40" cy="128" r="8" fill="#00F5A0"></circle>
    <circle cx="216" cy="128" r="8" fill="#FFB627"></circle>
    <circle cx="64" cy="64" r="8" fill="#FF79C6"></circle>
    <circle cx="192" cy="64" r="8" fill="#00E5FF"></circle>
    <circle cx="64" cy="192" r="8" fill="#FF3864"></circle>
    <circle cx="192" cy="192" r="8" fill="#00F5A0"></circle>
  </g>
</svg>