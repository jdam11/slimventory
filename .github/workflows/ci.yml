name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  merge-conflict-check:
    name: Merge Conflict Check
    if: ${{ github.server_url == 'https://github.com' && github.event_name == 'pull_request' }}
    runs-on: ubuntu-24.04

    steps:
      - name: Check out pull request head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify pull request merges with current base
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          BASE_REPO: ${{ github.repository }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add base "https://github.com/${BASE_REPO}.git"
          git fetch --no-tags --depth=1 base "+refs/heads/${BASE_REF}:refs/remotes/base/${BASE_REF}"

          if ! git merge --no-commit --no-ff "refs/remotes/base/${BASE_REF}"; then
            echo "Pull request does not merge cleanly with ${BASE_REF}."
            echo "Conflicted files:"
            git diff --name-only --diff-filter=U
            exit 1
          fi

  backend:
    name: Backend
    if: ${{ github.server_url == 'https://github.com' }}
    runs-on: ubuntu-24.04
    container:
      image: python:3.13.3-slim

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Install uv
        working-directory: backend
        run: pip install uv

      - name: Sync backend dependencies
        working-directory: backend
        run: uv sync --frozen --extra dev --extra test

      - name: Run backend lint
        working-directory: backend
        run: uv run ruff check app/

      - name: Run backend tests
        working-directory: backend
        run: uv run python -m pytest tests/ -v

      - name: Compile backend sources
        working-directory: backend
        run: uv run python -m compileall app tests

  frontend:
    name: Frontend
    if: ${{ github.server_url == 'https://github.com' }}
    runs-on: ubuntu-24.04

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  secrets:
    name: Secret Scan
    if: ${{ github.server_url == 'https://github.com' }}
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Scan tracked files for secrets
        run: |
          docker run --rm \
            --network none \
            --volume "$PWD:/repo:ro" \
            --workdir /repo \
            ghcr.io/gitleaks/gitleaks:v8.30.1@sha256:c00b6bd0aeb3071cbcb79009cb16a60dd9e0a7c60e2be9ab65d25e6bc8abbb7f \
            dir .

  trivy-fs-scan:
    name: Trivy FS Scan
    if: ${{ github.server_url == 'https://github.com' }}
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Scan repository dependencies
        run: |
          mkdir -p "$RUNNER_TEMP/trivy-cache"
          docker run --rm \
            --volume "$PWD:/repo:ro" \
            --volume "$RUNNER_TEMP/trivy-cache:/root/.cache/trivy" \
            --workdir /repo \
            docker.io/aquasec/trivy:0.69.3@sha256:bcc376de8d77cfe086a917230e818dc9f8528e3c852f7b1aff648949b6258d1c \
            fs \
            --quiet \
            --scanners vuln \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            .

  grype-fs-scan:
    name: Grype FS Scan
    if: ${{ github.server_url == 'https://github.com' }}
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Scan repository dependencies with Grype
        run: |
          mkdir -p "$RUNNER_TEMP/grype-cache"
          docker run --rm \
            --volume "$PWD:/repo:ro" \
            --volume "$RUNNER_TEMP/grype-cache:/grype-cache" \
            --workdir /repo \
            --env GRYPE_DB_CACHE_DIR=/grype-cache \
            docker.io/anchore/grype:v0.111.0@sha256:af9f30d1de4ecfbbcd2b674371e8df787879e16832af8ab81551b0bf1ec0ad5b \
            dir:/repo \
            --fail-on high \
            --only-fixed

  trivy-config-scan:
    name: Trivy Config Scan
    if: ${{ github.server_url == 'https://github.com' }}
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Scan Dockerfiles and Compose config
        run: |
          scan_dir="$RUNNER_TEMP/trivy-config-scan"
          mkdir -p "$scan_dir"
          cp backend/Dockerfile "$scan_dir/backend.Dockerfile"
          cp frontend/Dockerfile "$scan_dir/frontend.Dockerfile"
          cp ansible-runner/Dockerfile "$scan_dir/ansible-runner.Dockerfile"
          cp docker-compose.yml "$scan_dir/docker-compose.yml"
          mkdir -p "$RUNNER_TEMP/trivy-cache"
          docker run --rm \
            --volume "$scan_dir:/scan:ro" \
            --volume "$RUNNER_TEMP/trivy-cache:/root/.cache/trivy" \
            docker.io/aquasec/trivy:0.69.3@sha256:bcc376de8d77cfe086a917230e818dc9f8528e3c852f7b1aff648949b6258d1c \
            config \
            --quiet \
            --severity HIGH,CRITICAL \
            /scan

  repository-security-scan:
    name: Repository Security Scan
    if: ${{ always() && github.server_url == 'https://github.com' }}
    runs-on: ubuntu-24.04
    needs:
      - secrets
      - trivy-fs-scan
      - grype-fs-scan
      - trivy-config-scan

    steps:
      - name: Verify repository security scans
        env:
          SECRETS_RESULT: ${{ needs.secrets.result }}
          TRIVY_FS_RESULT: ${{ needs.trivy-fs-scan.result }}
          GRYPE_FS_RESULT: ${{ needs.grype-fs-scan.result }}
          TRIVY_CONFIG_RESULT: ${{ needs.trivy-config-scan.result }}
        run: |
          failed=0
          for result in \
            "Secret Scan:${SECRETS_RESULT}" \
            "Trivy FS Scan:${TRIVY_FS_RESULT}" \
            "Grype FS Scan:${GRYPE_FS_RESULT}" \
            "Trivy Config Scan:${TRIVY_CONFIG_RESULT}"; do
            name="${result%%:*}"
            status="${result#*:}"
            if [ "$status" != "success" ]; then
              echo "${name} finished with status: ${status}"
              failed=1
            fi
          done
          exit "$failed"
