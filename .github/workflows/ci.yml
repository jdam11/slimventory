name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  merge-conflict-check:
    name: Merge Conflict Check
    if: ${{ github.server_url == 'https://github.com' }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out pull request head
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify pull request merges with current base
        if: ${{ github.event_name == 'pull_request' }}
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          BASE_REPO: ${{ github.repository }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add base "https://github.com/${BASE_REPO}.git"
          git fetch --no-tags --depth=1 base "+refs/heads/${BASE_REF}:refs/remotes/base/${BASE_REF}"

          if ! git merge --no-commit --no-ff "refs/remotes/base/${BASE_REF}"; then
            echo "Pull request does not merge cleanly with ${BASE_REF}."
            echo "Conflicted files:"
            git diff --name-only --diff-filter=U
            exit 1
          fi

      - name: Report non-pull-request status
        if: ${{ github.event_name != 'pull_request' }}
        run: echo "Merge conflict check only applies to pull_request events."

  backend:
    name: Backend
    if: ${{ github.server_url == 'https://github.com' }}
    runs-on: ubuntu-latest
    container:
      image: python:3.13.3-slim

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install uv
        working-directory: backend
        run: pip install uv

      - name: Sync backend dependencies
        working-directory: backend
        run: uv sync --frozen --extra dev --extra test

      - name: Run backend lint
        working-directory: backend
        run: uv run ruff check app/

      - name: Run backend tests
        working-directory: backend
        run: uv run python -m pytest tests/ -v

      - name: Compile backend sources
        working-directory: backend
        run: uv run python -m compileall app tests

  frontend:
    name: Frontend
    if: ${{ github.server_url == 'https://github.com' }}
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 2

      - name: Detect frontend changes
        id: frontend-changes
        working-directory: .
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          BEFORE_SHA: ${{ github.event.before }}
          EVENT_NAME: ${{ github.event_name }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          changed_files=""

          if [ "$EVENT_NAME" = "pull_request" ] && [ -n "$BASE_SHA" ]; then
            if git fetch --no-tags --depth=1 origin "$BASE_SHA"; then
              changed_files=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
            else
              echo "Unable to fetch pull request base; running frontend build."
              echo "changed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          elif [ "$EVENT_NAME" = "push" ] && [ -n "$BEFORE_SHA" ] && [ "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
            if git fetch --no-tags --depth=1 origin "$BEFORE_SHA"; then
              changed_files=$(git diff --name-only "$BEFORE_SHA" "$HEAD_SHA")
            else
              echo "Unable to fetch previous push commit; running frontend build."
              echo "changed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          else
            echo "No comparable base commit for ${EVENT_NAME}; running frontend build."
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if printf '%s\n' "$changed_files" | grep -Eq '^(frontend/|\.github/workflows/ci\.yml$)'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node
        if: ${{ steps.frontend-changes.outputs.changed == 'true' }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        if: ${{ steps.frontend-changes.outputs.changed == 'true' }}
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Build frontend
        if: ${{ steps.frontend-changes.outputs.changed == 'true' }}
        run: npm run build

      - name: Report skipped frontend build
        if: ${{ steps.frontend-changes.outputs.changed == 'false' }}
        working-directory: .
        run: echo "No frontend or CI workflow changes detected; skipped frontend setup and build."

  secrets:
    name: Secret Scan
    if: ${{ github.server_url == 'https://github.com' }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Scan tracked files for secrets
        run: ./scripts/run_gitleaks.sh dir .

  image-scan:
    name: Repository Security Scan
    if: ${{ github.server_url == 'https://github.com' }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Trivy
        run: |
          curl -fsSLo /tmp/trivy.tar.gz \
            https://github.com/aquasecurity/trivy/releases/download/v0.69.3/trivy_0.69.3_Linux-64bit.tar.gz
          printf '%s  %s\n' \
            '1816b632dfe529869c740c0913e36bd1629cb7688bd5634f4a858c1d57c88b75' \
            '/tmp/trivy.tar.gz' | sha256sum -c -
          tar -xzf /tmp/trivy.tar.gz -C /tmp trivy
          install -m 0755 /tmp/trivy /usr/local/bin/trivy

      - name: Install Grype
        run: |
          curl -fsSLo /tmp/grype.tar.gz \
            https://github.com/anchore/grype/releases/download/v0.111.0/grype_0.111.0_linux_amd64.tar.gz
          printf '%s  %s\n' \
            '18ed2048d7a233566b681121d4632364f5f25d72cca86acc4c7ac57210d78a87' \
            '/tmp/grype.tar.gz' | sha256sum -c -
          tar -xzf /tmp/grype.tar.gz -C /tmp grype
          install -m 0755 /tmp/grype /usr/local/bin/grype

      - name: Scan repository dependencies
        run: |
          trivy fs \
            --quiet \
            --scanners vuln \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            .

      - name: Scan repository dependencies with Grype
        run: |
          grype . \
            --fail-on high \
            --only-fixed

      - name: Scan Dockerfiles and Compose config
        run: |
          mkdir -p /tmp/trivy-config-scan
          cp backend/Dockerfile /tmp/trivy-config-scan/backend.Dockerfile
          cp frontend/Dockerfile /tmp/trivy-config-scan/frontend.Dockerfile
          cp ansible-runner/Dockerfile /tmp/trivy-config-scan/ansible-runner.Dockerfile
          cp docker-compose.yml /tmp/trivy-config-scan/docker-compose.yml
          trivy config \
            --quiet \
            --severity HIGH,CRITICAL \
            /tmp/trivy-config-scan
