name: Publish Docker Images

on:
  pull_request:
    types:
      - closed
    branches:
      - main

permissions:
  contents: write
  packages: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-meta:
    name: Prepare Accepted Release
    if: ${{ github.server_url == 'https://github.com' && github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main' && github.event.pull_request.head.repo.full_name == github.repository && startsWith(github.event.pull_request.head.ref, 'public-release/v') }}
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Extract version from release branch
        id: version
        run: |
          RELEASE_BRANCH="${{ github.event.pull_request.head.ref }}"
          VERSION="${RELEASE_BRANCH#public-release/v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Tag accepted public release
        run: |
          git tag -f "v${{ steps.version.outputs.version }}" "$GITHUB_SHA"
          git push --force origin "v${{ steps.version.outputs.version }}"

  publish:
    name: Build and push ${{ matrix.service }}
    if: ${{ github.server_url == 'https://github.com' && github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main' && github.event.pull_request.head.repo.full_name == github.repository && startsWith(github.event.pull_request.head.ref, 'public-release/v') }}
    needs:
      - release-meta
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            context: ./backend
            image: jdam11/slim-backend
            ghcr_image: ghcr.io/jdam11/slim-backend
          - service: frontend
            context: ./frontend
            image: jdam11/slim-frontend
            ghcr_image: ghcr.io/jdam11/slim-frontend
          - service: ansible-runner
            context: ./ansible-runner
            image: jdam11/slim-ansible-runner
            ghcr_image: ghcr.io/jdam11/slim-ansible-runner

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Log in to Docker Hub
        uses: docker/login-action@184bdaa0721073962dff0199f1fb9940f07167d1 # v3.5.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@184bdaa0721073962dff0199f1fb9940f07167d1 # v3.5.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ matrix.image }}:latest
            ${{ matrix.image }}:${{ needs.release-meta.outputs.version }}
            ${{ matrix.ghcr_image }}:latest
            ${{ matrix.ghcr_image }}:${{ needs.release-meta.outputs.version }}
          cache-from: type=registry,ref=${{ matrix.image }}:buildcache
          cache-to: |
            type=registry,ref=${{ matrix.image }}:buildcache,mode=max
            type=registry,ref=${{ matrix.ghcr_image }}:buildcache,mode=max

      - name: Record image digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          VERSION: ${{ needs.release-meta.outputs.version }}
        run: |
          mkdir -p image-digests
          digest_file="image-digests/${{ matrix.service }}.txt"
          {
            echo "${{ matrix.service }}"
            echo "${{ matrix.image }}:${VERSION}"
            echo "${{ matrix.image }}@${DIGEST}"
            echo "${{ matrix.ghcr_image }}:${VERSION}"
            echo "${{ matrix.ghcr_image }}@${DIGEST}"
          } > "$digest_file"

          {
            echo "### ${{ matrix.service }} image digest"
            echo
            echo "- \`${{ matrix.image }}:${VERSION}\`"
            echo "- \`${{ matrix.image }}@${DIGEST}\`"
            echo "- \`${{ matrix.ghcr_image }}:${VERSION}\`"
            echo "- \`${{ matrix.ghcr_image }}@${DIGEST}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Scan pushed image
        env:
          IMAGE_REF: ${{ matrix.ghcr_image }}@${{ steps.build.outputs.digest }}
        run: |
          curl -fsSLo /tmp/trivy.tar.gz \
            https://github.com/aquasecurity/trivy/releases/download/v0.69.3/trivy_0.69.3_Linux-64bit.tar.gz
          printf '%s  %s\n' \
            '1816b632dfe529869c740c0913e36bd1629cb7688bd5634f4a858c1d57c88b75' \
            '/tmp/trivy.tar.gz' | sha256sum -c -
          tar -xzf /tmp/trivy.tar.gz -C /tmp trivy
          install -m 0755 /tmp/trivy /usr/local/bin/trivy

          mkdir -p image-scans
          scan_file="image-scans/${{ matrix.service }}.txt"
          set +e
          trivy image \
            --quiet \
            --scanners vuln \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 1 \
            "$IMAGE_REF" | tee "$scan_file"
          scan_status=${PIPESTATUS[0]}
          set -e

          {
            echo
            echo "### ${{ matrix.service }} image vulnerability scan"
            echo
            echo "- Image: \`${IMAGE_REF}\`"
            echo "- Scanner: Trivy v0.69.3"
            echo "- Result: $([ "$scan_status" -eq 0 ] && echo 'passed' || echo 'failed')"
          } >> "$GITHUB_STEP_SUMMARY"

          exit "$scan_status"

      - name: Upload image release metadata
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: image-release-${{ matrix.service }}
          path: |
            image-digests/${{ matrix.service }}.txt
            image-scans/${{ matrix.service }}.txt
